name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: grokimarkdown-linux-x64
          - target: bun-linux-arm64
            asset: grokimarkdown-linux-arm64
          - target: bun-darwin-x64
            asset: grokimarkdown-darwin-x64
          - target: bun-darwin-arm64
            asset: grokimarkdown-darwin-arm64
          - target: bun-windows-x64
            asset: grokimarkdown-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.asset }}
        run: |
          mkdir -p dist
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.target }} \
            src/index.ts \
            --outfile dist/${{ matrix.asset }}

      - name: Checksum
        working-directory: dist
        run: sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
